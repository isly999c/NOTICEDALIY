<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閃記日誌 (售服專用版)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { padding-top: env(safe-area-inset-top); background-color: #f8fafc; }
        .page { display: none; }
        .page.active { display: block; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .recording { background-color: #ef4444 !important; color: white !important; animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="text-slate-700">

    <nav class="flex justify-center gap-4 bg-slate-900 p-4 text-white sticky top-0 z-50 shadow-md">
        <button id="nav-write" class="px-4 py-2 rounded-full font-bold bg-blue-500 transition-colors" onclick="switchPage('write')">📝 寫日誌</button>
        <button id="nav-history" class="px-4 py-2 rounded-full font-bold hover:bg-slate-700 transition-colors" onclick="switchPage('history')">📂 手機紀錄</button>
    </nav>

    <div class="max-w-2xl mx-auto p-4 pb-20">
        
        <div id="page-write" class="page active">
            <div class="bg-white p-5 rounded-2xl shadow-sm mb-5 border-l-4 border-emerald-500">
                <details>
                    <summary class="font-bold text-slate-800 cursor-pointer outline-none">⚙️ 系統與雲端設定 (點開填入網址)</summary>
                    <div class="mt-4 space-y-3">
                        <div>
                            <label class="block text-xs font-semibold mb-1 text-slate-500">1. Gemini API 金鑰</label>
                            <input type="password" id="apiKey" placeholder="輸入 API Key..." class="w-full p-2 border border-slate-300 rounded-lg bg-slate-50 text-sm focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold mb-1 text-slate-500">2. Google Sheets Web App 網址</label>
                            <input type="password" id="sheetUrl" placeholder="貼上剛剛部署拿到的網址..." class="w-full p-2 border border-slate-300 rounded-lg bg-slate-50 text-sm focus:outline-none focus:border-emerald-500">
                        </div>
                    </div>
                </details>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-slate-900">今日工作碎記</h2>
                    <span id="saveStatus" class="text-xs px-2 py-1 bg-slate-100 text-slate-500 rounded-lg">自動儲存草稿</span>
                </div>
                
                <textarea id="logInput" placeholder="在此輸入或使用語音..." class="w-full h-48 p-3 border border-slate-300 rounded-xl bg-slate-50 focus:outline-none focus:border-blue-500 resize-none"></textarea>
                
                <div class="flex justify-between text-xs text-slate-500 mt-2 mb-4">
                    <span id="charCount">字數: 0</span>
                    <button onclick="clearDraft()" class="text-red-500 hover:text-red-700">清空草稿</button>
                </div>
                
                <button id="micBtn" class="w-full p-4 mb-3 rounded-xl font-bold bg-slate-200 text-slate-800 transition-all flex justify-center items-center gap-2">
                    🎤 語音輸入 (自動加時間)
                </button>
                
                <button id="submitBtn" class="w-full p-4 rounded-xl font-bold bg-blue-500 text-white hover:bg-blue-600 transition-colors flex justify-center items-center gap-2">
                    ✨ AI 分類寫入試算表
                </button>
                
                <div id="loading" class="hidden text-center mt-5 text-blue-500 font-bold">🧠 AI 正在分析與寫入試算表，請稍候...</div>
                <div id="result" class="hidden mt-5 p-4 bg-slate-50 rounded-xl border-l-4 border-blue-500 whitespace-pre-wrap text-sm leading-relaxed"></div>
            </div>
        </div>

        <div id="page-history" class="page">
            <div class="bg-white p-5 rounded-2xl shadow-sm">
                <h2 class="text-lg font-bold text-slate-900 mb-2">手機歷史備份</h2>
                <div id="historyContainer" class="space-y-4"></div>
            </div>
        </div>

    </div>

    <script>
        window.onload = () => {
            if (localStorage.getItem('flashlog_api_key')) document.getElementById('apiKey').value = localStorage.getItem('flashlog_api_key');
            if (localStorage.getItem('flashlog_sheet_url')) document.getElementById('sheetUrl').value = localStorage.getItem('flashlog_sheet_url');
            if (localStorage.getItem('flashlog_draft')) document.getElementById('logInput').value = localStorage.getItem('flashlog_draft');
            updateCharCount();
            loadHistory();
        };

        document.getElementById('apiKey').addEventListener('input', (e) => localStorage.setItem('flashlog_api_key', e.target.value));
        document.getElementById('sheetUrl').addEventListener('input', (e) => localStorage.setItem('flashlog_sheet_url', e.target.value));
        
        let saveTimeout;
        document.getElementById('logInput').addEventListener('input', (e) => {
            updateCharCount();
            const status = document.getElementById('saveStatus');
            status.innerText = '儲存中...'; status.className = 'text-xs px-2 py-1 bg-yellow-100 text-yellow-700 rounded-lg';
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                localStorage.setItem('flashlog_draft', e.target.value);
                status.innerText = '已儲存草稿'; status.className = 'text-xs px-2 py-1 bg-green-100 text-green-700 rounded-lg';
            }, 500);
        });

        const micBtn = document.getElementById('micBtn');
        if ('webkitSpeechRecognition' in window || 'speechRecognition' in window) {
            const recognition = new (window.webkitSpeechRecognition || window.speechRecognition)();
            recognition.lang = 'zh-TW';
            recognition.onstart = () => { micBtn.classList.add('recording'); micBtn.innerText = '🛑 聆聽中... (點擊結束)'; };
            recognition.onend = () => { micBtn.classList.remove('recording'); micBtn.innerText = '🎤 語音輸入'; };
            recognition.onresult = (e) => {
                const timeStr = `[${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}]`;
                const input = document.getElementById('logInput');
                input.value += (input.value ? '\n' : '') + `${timeStr} ${e.results[0][0].transcript}`;
                input.dispatchEvent(new Event('input'));
            };
            micBtn.addEventListener('click', () => micBtn.classList.contains('recording') ? recognition.stop() : recognition.start());
        } else { micBtn.style.display = 'none'; }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const sheetUrl = document.getElementById('sheetUrl').value.trim();
            const textData = document.getElementById('logInput').value.trim();
            
            if (!apiKey) return alert('請先點開上方設定，輸入 Gemini API Key！'); 
            if (!textData) return alert('請輸入工作紀錄！');

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
            document.getElementById('submitBtn').disabled = true;

            // 🌟 專為你的試算表設計的精準 Prompt 🌟
            const systemPrompt = `你是一位專業的機電工程售後服務助理。請將使用者的隨手紀錄修正為專業術語，並嚴格以 JSON 格式輸出。

JSON 格式：
{
  "company": "公司名稱或服務單位",
  "issues": "問題與異常 (簡述機台報警或發生了什麼錯誤)",
  "tasks": "工作內容 (執行的維修、保養或教育訓練動作)",
  "problemDesc": "問題描述 (詳細敘述客戶端反應的故障現象)",
  "result": "處理結果 (售服處理進度，如：已排除、待料、需追蹤)"
}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: `${systemPrompt}\n\n【今日紀錄】：\n${textData}` }] }],
                        generationConfig: { temperature: 0.1, responseMimeType: "application/json" }
                    })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                const aiResult = JSON.parse(data.candidates[0].content.parts[0].text);
                
                // 為了讓時間符合台灣習慣，格式化為 YYYY/MM/DD HH:MM
                const now = new Date();
                const displayDate = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

                const sheetData = {
                    date: displayDate,
                    company: aiResult.company || '無',
                    issues: aiResult.issues || '無',
                    tasks: aiResult.tasks || '無',
                    problemDesc: aiResult.problemDesc || '無',
                    result: aiResult.result || '無',
                    raw: textData
                };

                if (sheetUrl) {
                    try {
                        await fetch(sheetUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(sheetData)
                        });
                    } catch(e) {
                        alert("⚠️ 寫入試算表失敗，請檢查網址是否正確。");
                    }
                }

                const reportHtml = `
<strong class="text-slate-900">🏢 公司/服務單位</strong><br>${sheetData.company}<br><br>
<strong class="text-slate-900">⚠️ 問題與異常</strong><br>${sheetData.issues}<br><br>
<strong class="text-slate-900">📂 工作內容</strong><br>${sheetData.tasks}<br><br>
<strong class="text-slate-900">📝 問題描述 (售服)</strong><br>${sheetData.problemDesc}<br><br>
<strong class="text-slate-900">✅ 處理結果</strong><br>${sheetData.result}`;

                document.getElementById('result').innerHTML = reportHtml;
                document.getElementById('result').classList.remove('hidden');

                saveToLocal(reportHtml, textData, displayDate);
                
                setTimeout(() => { 
                    if(confirm(sheetUrl ? '✅ 已成功寫入你的 Google 試算表！是否清空草稿？' : '✅ 紀錄成功！(未設定試算表網址)。是否清空草稿？')) { 
                        clearDraft(); 
                    } 
                }, 500);

            } catch (err) { alert('錯誤: ' + err.message); } finally { document.getElementById('loading').classList.add('hidden'); document.getElementById('submitBtn').disabled = false; }
        });

        function saveToLocal(reportHtml, rawText, displayDate) {
            let history = JSON.parse(localStorage.getItem('flashlog_history') || '[]');
            history.unshift({ id: Date.now().toString(), date: displayDate, raw: rawText, report: reportHtml });
            localStorage.setItem('flashlog_history', JSON.stringify(history));
            loadHistory();
        }

        window.switchPage = function(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageName}`).classList.add('active');
            document.getElementById('nav-write').className = `px-4 py-2 rounded-full font-bold transition-colors ${pageName==='write'?'bg-blue-500':'hover:bg-slate-700'}`;
            document.getElementById('nav-history').className = `px-4 py-2 rounded-full font-bold transition-colors ${pageName==='history'?'bg-blue-500':'hover:bg-slate-700'}`;
        }

        function loadHistory() {
            const container = document.getElementById('historyContainer');
            let records = JSON.parse(localStorage.getItem('flashlog_history') || '[]');
            if (records.length === 0) return container.innerHTML = '<div class="text-center text-slate-400 py-4">尚無手機紀錄</div>';
            
            container.innerHTML = records.map(item => `
                <div class="border-b border-slate-200 pb-4 last:border-0">
                    <div class="flex justify-between items-start mb-2">
                        <div class="font-bold text-slate-800">📅 ${item.date}</div>
                        <button onclick="deleteRecord('${item.id}')" class="text-xs px-3 py-1 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 font-bold">🗑️ 刪除本地</button>
                    </div>
                    <div class="text-sm text-slate-600 bg-slate-50 p-3 rounded-xl">${item.report}</div>
                </div>
            `).join('');
        }

        window.deleteRecord = function(id) {
            if(!confirm('確定刪除此本地備份？(不影響已傳到試算表的資料)')) return;
            let history = JSON.parse(localStorage.getItem('flashlog_history') || '[]');
            localStorage.setItem('flashlog_history', JSON.stringify(history.filter(item => item.id !== id)));
            loadHistory();
        }
        window.clearDraft = function() { document.getElementById('logInput').value=''; localStorage.setItem('flashlog_draft',''); updateCharCount(); document.getElementById('result').classList.add('hidden'); }
        window.updateCharCount = function() { document.getElementById('charCount').innerText = `字數: ${document.getElementById('logInput').value.length}`; }
    </script>
</body>
</html>
