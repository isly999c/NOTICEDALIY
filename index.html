<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閃記日誌 FlashLog (雲端版)</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FlashLog">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // ⚠️ 請在這裡貼上你從 Firebase 拿到的 firebaseConfig
        // ==========================================
        const firebaseConfig = {
           // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDG3Xo-99WGRbXKRH1h6O0WKRu0679ZCb8",
  authDomain: "flashlog-ebedd.firebaseapp.com",
  projectId: "flashlog-ebedd",
  storageBucket: "flashlog-ebedd.firebasestorage.app",
  messagingSenderId: "340618263320",
  appId: "1:340618263320:web:8623be81748d7e49703c6d",
  measurementId: "G-DLKB0PCB45"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
        };
        
        let db = null;
        // 嘗試初始化 Firebase，如果沒填 config 則回退到 LocalStorage
        try {
            if(firebaseConfig.apiKey) {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                console.log("Firebase 雲端連線成功！");
            } else {
                console.warn("未設定 Firebase Config，改用本機儲存 (LocalStorage)");
            }
        } catch(e) {
            console.error("Firebase 初始化失敗:", e);
        }

        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.query = query;
        window.orderBy = orderBy;
    </script>
    <style>
        body { padding-top: env(safe-area-inset-top); background-color: #f8fafc; }
        .page { display: none; }
        .page.active { display: block; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .recording { background-color: #ef4444 !important; color: white !important; animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="text-slate-700">

    <!-- 導覽列 -->
    <nav class="flex justify-center gap-4 bg-slate-900 p-4 text-white sticky top-0 z-50 shadow-md">
        <button id="nav-write" class="px-4 py-2 rounded-full font-bold bg-blue-500 transition-colors" onclick="switchPage('write')">📝 寫日誌</button>
        <button id="nav-history" class="px-4 py-2 rounded-full font-bold hover:bg-slate-700 transition-colors" onclick="switchPage('history')">☁️ 雲端紀錄</button>
    </nav>

    <div class="max-w-2xl mx-auto p-4 pb-20">
        
        <!-- ================= 寫入頁面 ================= -->
        <div id="page-write" class="page active">
            
            <div class="bg-white p-5 rounded-2xl shadow-sm mb-5">
                <label class="block text-sm font-semibold mb-2 text-slate-600">Gemini API 金鑰</label>
                <input type="password" id="apiKey" placeholder="輸入 API Key..." class="w-full p-3 border border-slate-300 rounded-xl bg-slate-50 focus:outline-none focus:border-blue-500 transition-colors">
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-slate-900">今日工作碎記</h2>
                    <span id="saveStatus" class="text-xs px-2 py-1 bg-slate-100 text-slate-500 rounded-lg">自動儲存草稿</span>
                </div>
                
                <textarea id="logInput" placeholder="在此輸入或使用語音..." class="w-full h-48 p-3 border border-slate-300 rounded-xl bg-slate-50 focus:outline-none focus:border-blue-500 resize-none"></textarea>
                
                <div class="flex justify-between text-xs text-slate-500 mt-2 mb-4">
                    <span id="charCount">字數: 0</span>
                    <button onclick="clearDraft()" class="text-red-500 hover:text-red-700">清空草稿</button>
                </div>
                
                <button id="micBtn" class="w-full p-4 mb-3 rounded-xl font-bold bg-slate-200 text-slate-800 transition-all flex justify-center items-center gap-2">
                    🎤 語音輸入 (自動加時間)
                </button>
                
                <button id="submitBtn" class="w-full p-4 rounded-xl font-bold bg-blue-500 text-white hover:bg-blue-600 transition-colors flex justify-center items-center gap-2">
                    ✨ AI 分類統整並上傳雲端
                </button>
                
                <div id="loading" class="hidden text-center mt-5 text-blue-500 font-bold">🧠 AI 正在分析與分類中，請稍候...</div>
                <div id="result" class="hidden mt-5 p-4 bg-slate-50 rounded-xl border-l-4 border-blue-500 whitespace-pre-wrap text-sm leading-relaxed"></div>
            </div>
        </div>

        <!-- ================= 歷史紀錄頁面 ================= -->
        <div id="page-history" class="page">
            <div class="bg-white p-5 rounded-2xl shadow-sm">
                <h2 class="text-lg font-bold text-slate-900 mb-2">雲端歷史工作日報</h2>
                <p class="text-xs text-slate-500 mb-5">資料已同步至 Google Firebase 雲端。</p>
                
                <button onclick="exportData()" class="w-full mb-6 p-3 rounded-xl font-bold border border-blue-500 text-blue-500 hover:bg-blue-50 transition-colors">
                    📥 下載實體備份 (JSON)
                </button>
                
                <div id="historyContainer" class="space-y-4">
                    <!-- 歷史紀錄將由 JS 生成 -->
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        // 等待 Firebase 初始化完成
        setTimeout(() => {
            const db = window.db;
            
            // --- 狀態還原 ---
            if (localStorage.getItem('flashlog_api_key')) document.getElementById('apiKey').value = localStorage.getItem('flashlog_api_key');
            if (localStorage.getItem('flashlog_draft')) document.getElementById('logInput').value = localStorage.getItem('flashlog_draft');
            updateCharCount();

            // --- UI 互動 ---
            document.getElementById('apiKey').addEventListener('input', (e) => localStorage.setItem('flashlog_api_key', e.target.value));
            
            let saveTimeout;
            document.getElementById('logInput').addEventListener('input', (e) => {
                updateCharCount();
                const status = document.getElementById('saveStatus');
                status.innerText = '儲存中...'; status.className = 'text-xs px-2 py-1 bg-yellow-100 text-yellow-700 rounded-lg';
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    localStorage.setItem('flashlog_draft', e.target.value);
                    status.innerText = '已儲存草稿'; status.className = 'text-xs px-2 py-1 bg-green-100 text-green-700 rounded-lg';
                }, 500);
            });

            // --- 語音辨識 ---
            const micBtn = document.getElementById('micBtn');
            if ('webkitSpeechRecognition' in window || 'speechRecognition' in window) {
                const recognition = new (window.webkitSpeechRecognition || window.speechRecognition)();
                recognition.lang = 'zh-TW';
                recognition.onstart = () => { micBtn.classList.add('recording'); micBtn.innerText = '🛑 聆聽中... (點擊結束)'; };
                recognition.onend = () => { micBtn.classList.remove('recording'); micBtn.innerText = '🎤 語音輸入 (自動加時間)'; };
                recognition.onresult = (e) => {
                    const timeStr = `[${String(new Date().getHours()).padStart(2, '0')}:${String(new Date().getMinutes()).padStart(2, '0')}]`;
                    const input = document.getElementById('logInput');
                    input.value += (input.value ? '\n' : '') + `${timeStr} ${e.results[0][0].transcript}`;
                    input.dispatchEvent(new Event('input'));
                };
                micBtn.addEventListener('click', () => micBtn.classList.contains('recording') ? recognition.stop() : recognition.start());
            } else { micBtn.style.display = 'none'; }

            // --- AI 處理 ---
            document.getElementById('submitBtn').addEventListener('click', async () => {
                const apiKey = document.getElementById('apiKey').value.trim();
                const textData = document.getElementById('logInput').value.trim();
                if (!apiKey) return alert('請輸入 API Key！'); if (!textData) return alert('請輸入內容！');

                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('result').classList.add('hidden');
                document.getElementById('submitBtn').disabled = true;

                // 🌟 最新的精準分類 Prompt 🌟
                const systemPrompt = `你是一位專業的自動化與機電工程領域職場助理。請將以下使用者提供的當日隨手紀錄，精準統整、修正為專業術語，並嚴格依據以下結構進行分類輸出。

                請嚴格以下列 Markdown 格式輸出：

                🏢 **公司名稱/服務單位**
                - [請從紀錄中辨識相關的公司名稱；若文字未提及，則依據脈絡歸類，或顯示「內部技術單位」]

                📂 **工作內容分類**
                * **🛠️ 設備檢修與異常排查**：(若內容涉及維修項目，請詳細條列)
                * **🎓 技術教育訓練**：(若內容涉及教育訓練、新人培訓，請條列)
                * **📋 最終驗收與 Final Check**：(若內容涉及出機檢驗，請條列)

                ⚠️ **問題與異常清單**
                - 詳細列出今日遇到的具體錯誤(如零速檢知錯誤)、報警訊號及排查進度。

                🔜 **待辦與接續事項**
                - 後續需追蹤的項目或明日計畫。`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ role: "user", parts: [{ text: `${systemPrompt}\n\n【今日紀錄】：\n${textData}` }] }],
                            generationConfig: { temperature: 0.2 }
                        })
                    });
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    let report = data.candidates[0].content.parts[0].text;
                    document.getElementById('result').innerHTML = report.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-slate-900">$1</strong>');
                    document.getElementById('result').classList.remove('hidden');

                    // 存入 Firebase 或 LocalStorage
                    await saveToCloud(report, textData);
                    
                    setTimeout(() => { if(confirm('✅ 雲端上傳成功！是否清空草稿？')) { document.getElementById('logInput').value=''; localStorage.setItem('flashlog_draft',''); updateCharCount(); } }, 500);
                } catch (err) { alert('錯誤: ' + err.message); } 
                finally { document.getElementById('loading').classList.add('hidden'); document.getElementById('submitBtn').disabled = false; }
            });

        }, 1000); // 確保模組載入完成

        // --- 資料儲存 (優先存 Firebase，失敗存 LocalStorage) ---
        async function saveToCloud(reportHtml, rawText) {
            const dateStr = new Date().toISOString(); // ISO 格式方便排序
            const displayDate = new Date().toLocaleString('zh-TW', { hour12: false });
            
            const record = { date: dateStr, displayDate: displayDate, raw: rawText, report: reportHtml };

            if (window.db) {
                try {
                    await window.addDoc(window.collection(window.db, "flashlogs"), record);
                    console.log("已存入 Firestore");
                    return;
                } catch (e) {
                    console.error("Firestore 寫入失敗，改存本地:", e);
                }
            }
            
            // 本地備用儲存
            let history = JSON.parse(localStorage.getItem('flashlog_history') || '[]');
            history.unshift(record);
            localStorage.setItem('flashlog_history', JSON.stringify(history));
        }

        // --- 渲染歷史紀錄 ---
        window.switchPage = async function(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageName}`).classList.add('active');
            
            document.getElementById('nav-write').className = `px-4 py-2 rounded-full font-bold transition-colors ${pageName==='write'?'bg-blue-500':'hover:bg-slate-700'}`;
            document.getElementById('nav-history').className = `px-4 py-2 rounded-full font-bold transition-colors ${pageName==='history'?'bg-blue-500':'hover:bg-slate-700'}`;
            
            if(pageName === 'history') await loadHistory();
        }

        async function loadHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '<div class="text-center text-slate-400">讀取中...</div>';
            
            let records = [];

            if (window.db) {
                try {
                    const q = window.query(window.collection(window.db, "flashlogs"), window.orderBy("date", "desc"));
                    const querySnapshot = await window.getDocs(q);
                    querySnapshot.forEach((doc) => records.push(doc.data()));
                } catch (e) {
                    console.error("讀取 Firestore 失敗", e);
                }
            }

            // 如果 Firebase 沒開，或讀取失敗，就抓本地資料
            if(records.length === 0) {
                records = JSON.parse(localStorage.getItem('flashlog_history') || '[]');
            }

            if (records.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 py-4">雲端尚無紀錄</div>';
                return;
            }

            container.innerHTML = records.map(item => `
                <div class="border-b border-slate-200 pb-4 last:border-0">
                    <div class="font-bold text-slate-800 mb-2">📅 ${item.displayDate}</div>
                    <div class="text-sm text-slate-600 bg-slate-50 p-3 rounded-xl whitespace-pre-wrap">${item.report.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-slate-900">$1</strong>')}</div>
                    <details class="mt-2 text-xs text-slate-500 cursor-pointer">
                        <summary class="hover:text-blue-500">查看原始碎記</summary>
                        <div class="mt-2 p-2 bg-slate-100 rounded-lg whitespace-pre-wrap">${item.raw}</div>
                    </details>
                </div>
            `).join('');
        }

        // --- 全域工具 ---
        window.clearDraft = function() {
            if(confirm('確定清空？')) { document.getElementById('logInput').value=''; localStorage.setItem('flashlog_draft',''); updateCharCount(); document.getElementById('result').classList.add('hidden'); }
        }
        window.updateCharCount = function() { document.getElementById('charCount').innerText = `字數: ${document.getElementById('logInput').value.length}`; }
        window.exportData = function() {
            const data = localStorage.getItem('flashlog_history') || '[]'; // 若有 Firebase 需另外匯出邏輯，此處保留本地備份
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], { type: "application/json" }));
            a.download = `FlashLog_Backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
        }
    </script>
</body>
</html>
